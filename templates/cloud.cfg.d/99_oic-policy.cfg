# openimages.cloud organisational policy applied across all
# cloud-init-based distros (alpaquita, alpine, AL2, AL2023, oracle, …).
#
# Injected by the reusable workflow `build-libguestfs-image.yml` into
# /etc/cloud/cloud.cfg.d/99_oic-policy.cfg via virt-customize --copy-in
# after the caller's customize_script has run. Cloud-init merges this
# drop-in on top of whatever cloud.cfg the upstream image ships, so we
# override only the keys that matter for the OpenStack / Proxmox use
# case without disturbing distro-specific module orderings.
#
# To opt out per-build, set workflow input `oic_policy_drop_in: false`.
#
# If a distro needs to override default_user / system_info / network
# renderer beyond what upstream provides, ship a per-repo
# build/config/99_oic-distro.cfg drop-in (a higher-numbered file would
# also work; only `99_*` is reserved for this org policy).

# Pinned datasource discovery — OpenStack HTTP metadata first, then
# ConfigDrive (covers OpenStack-with-config-drive AND Proxmox VE which
# emits the same vfat-label-`config-2` openstack layout), then NoCloud
# (covers homelab users mounting a `cidata` seed), then `None` last so
# cloud-init exits cleanly when no datasource is found rather than
# retrying forever. We deliberately omit AltCloud / OVF / VMware / Ec2
# because they probe slow paths irrelevant to our targets.
datasource_list: ['OpenStack', 'ConfigDrive', 'NoCloud', 'None']

# Security defaults: no root SSH (forces login as the default user),
# no password auth at the cloud-init level (sshd_config.d/cloud-init
# also sets PasswordAuthentication no), and the hostname is
# overridable since the cloud platform owns it via metadata.
disable_root: true
ssh_pwauth: false
preserve_hostname: false

# Mount defaults so /etc/fstab entries created by cloud-init from the
# OpenStack metadata don't fail-fast at boot when an optional volume
# is missing.
mount_default_fields: [~, ~, 'auto', 'defaults,nofail', '0', '2']
