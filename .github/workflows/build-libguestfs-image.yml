name: Reusable build libguestfs image

# Reusable workflow consumed by repos that build their image via libguestfs
# (virt-customize / virt-sysprep / virt-sparsify). The build runs inside a
# stackopshq/libguestfs-tools container, on a self-hosted runner with
# /dev/kvm exposed (nested virtualization required by the libguestfs
# appliance for acceptable performance).
#
# Before the build, a dedicated verify-builder job checks that the
# build_container image was signed by the stackopshq CI via cosign keyless
# (Sigstore). If verification fails, the build is aborted before any side
# effect.

on:
  workflow_call:
    inputs:
      os_name:
        description: 'OS / repo slug used as bucket prefix (e.g., "alpaquita-linux").'
        type: string
        required: true
      version:
        description: 'Version string. Defaults to github.ref_name with leading "v" stripped.'
        type: string
        required: false
        default: ''
      output_filename:
        description: 'Final qcow2 filename. The token {version} is substituted.'
        type: string
        required: true
      upstream_url:
        description: 'URL of the base image to download. The token {version} is substituted.'
        type: string
        required: true
      decompress:
        description: 'Decompression to apply to the downloaded base: none|xz|gz|zst|bz2.'
        type: string
        required: false
        default: 'none'
      customize_script:
        description: 'Path (relative to caller repo) to the script invoked as: bash <script> <qcow2-path>.'
        type: string
        required: false
        default: 'build/customize.sh'
      run_sysprep:
        description: 'Whether to run virt-sysprep before sparsify.'
        type: boolean
        default: true
      sparsify_compress:
        description: 'Whether virt-sparsify should produce a compressed qcow2.'
        type: boolean
        default: true
      smoke_test:
        description: 'Whether to boot the produced qcow2 in qemu with a ConfigDrive seed and verify cloud-init runs end-to-end. Catches regressions in cloud-init / grub / sysprep BEFORE publish. Adds ~1-2 min to the build job.'
        type: boolean
        default: true
      smoke_test_timeout_seconds:
        description: 'Hard cap on the smoke-test wait loop (default 420s = 7 min). Bump for slow guests.'
        type: number
        default: 420
      runner_labels:
        description: 'JSON array of self-hosted runner labels (default: KVM-capable Linux runners).'
        type: string
        default: '["self-hosted","Linux","kvm"]'
      build_container:
        description: 'OCI image providing libguestfs tools, qemu-img, jq, curl. Must be signed via cosign keyless.'
        type: string
        default: 'ghcr.io/stackopshq/libguestfs-tools:2'
      builder_cert_identity:
        description: 'Cosign --certificate-identity-regexp to verify the build_container signature against. Override if you fork the builder image to a different repo.'
        type: string
        default: '^https://github.com/stackopshq/libguestfs-tools-container/'
      builder_oidc_issuer:
        description: 'Cosign --certificate-oidc-issuer (GitHub Actions OIDC by default).'
        type: string
        default: 'https://token.actions.githubusercontent.com'
      verify_builder:
        description: 'Whether to verify the build_container cosign signature before pull. Disable only for local testing.'
        type: boolean
        default: true
      bucket_name:
        description: 'Bucket name override on Garage and R2. Empty (default) uses os_name (per-distro bucket model). Buckets must exist on both backends with the same name.'
        type: string
        default: ''
      sign:
        description: 'Whether to cosign sign-blob the final qcow2 (keyless, GitHub OIDC).'
        type: boolean
        default: true
      publish:
        description: 'If false, skip upload + CF purge (dry-run useful for PR validation).'
        type: boolean
        default: true
      sync_latest:
        description: 'Whether to mirror this version to <os_name>/latest/.'
        type: boolean
        default: true
      cf_public_hostname:
        description: 'Public hostname served by Cloudflare (for purge URL composition).'
        type: string
        default: 'images.openimages.cloud'
      shared_actions_ref:
        description: 'Ref of open-img-cloud/.github to checkout for shared composite actions.'
        type: string
        default: 'main'
      variant:
        description: 'Optional variant identifier (libc, arch, ...) when the caller matrix produces multiple builds for the same version. When set, MANIFEST.json becomes MANIFEST-<variant>.json and SHA256SUMS becomes SHA256SUMS-<variant> to avoid collisions in the destination bucket.'
        type: string
        required: false
        default: ''

    # All publish-related secrets are declared `required: false` so callers
    # can dispatch the workflow with `publish: false` without configuring
    # any storage / CDN credentials (handy for PR validation and dry-runs).
    # When `publish: true`, the build job runs a `validate-publish-secrets`
    # step that fails fast if any of these are missing.
    secrets:
      S3_GARAGE_ENDPOINT: { required: false }
      S3_GARAGE_KEY_ID:   { required: false }
      S3_GARAGE_SECRET:   { required: false }
      R2_ENDPOINT:        { required: false }
      R2_KEY_ID:          { required: false }
      R2_SECRET:          { required: false }
      CF_ZONE_ID:         { required: false }
      CF_API_TOKEN:       { required: false }

permissions:
  contents: read
  id-token: write   # cosign keyless via GitHub OIDC

jobs:
  verify-builder:
    name: Verify builder image signature
    if: ${{ inputs.verify_builder }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    outputs:
      digest: ${{ steps.verify.outputs.digest }}
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2 (cosign 3.x — matches builder)

      - name: Verify cosign keyless signature
        id: verify
        env:
          IMAGE: ${{ inputs.build_container }}
          CERT_IDENTITY_REGEXP: ${{ inputs.builder_cert_identity }}
          OIDC_ISSUER: ${{ inputs.builder_oidc_issuer }}
        shell: bash
        run: |
          set -euo pipefail
          # `cosign verify --output json` prints an array of verified payloads;
          # critical.image."docker-manifest-digest" is the resolved manifest digest.
          json=$(cosign verify "$IMAGE" \
            --certificate-identity-regexp "$CERT_IDENTITY_REGEXP" \
            --certificate-oidc-issuer     "$OIDC_ISSUER" \
            --output json)
          echo "::group::Cosign verification payloads"
          echo "$json" | jq .
          echo "::endgroup::"
          digest=$(echo "$json" | jq -r '.[0].critical.image."docker-manifest-digest"')
          if [[ -z "$digest" || "$digest" == "null" ]]; then
            echo "::error::Could not extract digest from cosign output."
            exit 1
          fi
          echo "Verified $IMAGE @ $digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ inputs.os_name }} ${{ inputs.version || github.ref_name }}
    needs: verify-builder
    # If verify_builder is false, the verify-builder job is skipped; this `if`
    # ensures the build still runs in that case (skipped needs() are fatal otherwise).
    if: ${{ always() && (needs.verify-builder.result == 'success' || needs.verify-builder.result == 'skipped') }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    container:
      image: ${{ inputs.build_container }}
      options: --device=/dev/kvm
    outputs:
      version: ${{ steps.vars.outputs.version }}
      output_filename: ${{ steps.vars.outputs.output_filename }}
      sha256: ${{ steps.checksum.outputs.sha256 }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Checkout shared actions (open-img-cloud/.github)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: open-img-cloud/.github
          ref: ${{ inputs.shared_actions_ref }}
          path: .oic-shared

      - name: Resolve build variables
        id: vars
        shell: bash
        env:
          IN_VERSION: ${{ inputs.version }}
          IN_OUTPUT: ${{ inputs.output_filename }}
          IN_UPSTREAM: ${{ inputs.upstream_url }}
        run: |
          set -euo pipefail
          version="$IN_VERSION"
          if [[ -z "$version" ]]; then
            ref="${GITHUB_REF_NAME:-}"
            version="${ref#v}"
          fi
          if [[ -z "$version" ]]; then
            echo "::error::Could not determine version (no input, no tag ref)."
            exit 1
          fi
          output_filename="${IN_OUTPUT//\{version\}/$version}"
          upstream_url="${IN_UPSTREAM//\{version\}/$version}"
          {
            echo "version=$version"
            echo "output_filename=$output_filename"
            echo "upstream_url=$upstream_url"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$version output=$output_filename"

      - name: Validate publish secrets (fail fast when publish=true)
        if: ${{ inputs.publish }}
        shell: bash
        env:
          S3_GARAGE_ENDPOINT: ${{ secrets.S3_GARAGE_ENDPOINT }}
          S3_GARAGE_KEY_ID: ${{ secrets.S3_GARAGE_KEY_ID }}
          S3_GARAGE_SECRET: ${{ secrets.S3_GARAGE_SECRET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_KEY_ID: ${{ secrets.R2_KEY_ID }}
          R2_SECRET: ${{ secrets.R2_SECRET }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -eo pipefail
          missing=()
          for var in S3_GARAGE_ENDPOINT S3_GARAGE_KEY_ID S3_GARAGE_SECRET \
                     R2_ENDPOINT R2_KEY_ID R2_SECRET \
                     CF_ZONE_ID CF_API_TOKEN; do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::publish=true but the following org secrets are missing or empty: ${missing[*]}"
            echo "::error::configure them at https://github.com/organizations/${{ github.repository_owner }}/settings/secrets/actions or set publish=false for a dry-run"
            exit 1
          fi
          echo "All publish secrets present."

      - name: Prepare build directories
        shell: bash
        run: mkdir -p build/work build/output

      - name: Download upstream base image (with SHA256 verification when available)
        shell: bash
        env:
          UPSTREAM_URL: ${{ steps.vars.outputs.upstream_url }}
        run: |
          set -euo pipefail
          echo "Fetching $UPSTREAM_URL"
          curl -fL --retry 3 --retry-delay 5 -o build/work/base "$UPSTREAM_URL"
          ls -lh build/work/base

          # Try to fetch a SHA256 checksum published alongside the upstream
          # artifact (most distributors publish `<url>.sha256` next to the
          # binary). When present, verify; mismatch is fatal. When absent
          # (some upstreams don't publish checksums on stable URLs), warn
          # and continue — the cosign signature on our published qcow2 is
          # the authoritative integrity check downstream.
          sha_url="${UPSTREAM_URL}.sha256"
          if curl -fL --silent --show-error --retry 3 --retry-delay 5 \
               -o build/work/base.sha256 "$sha_url"; then
            expected=$(awk '{print $1}' build/work/base.sha256 | head -1)
            actual=$(sha256sum build/work/base | awk '{print $1}')
            if [[ "$expected" != "$actual" ]]; then
              echo "::error::Upstream SHA256 mismatch — possible MITM or corrupted download"
              echo "::error::  expected: $expected"
              echo "::error::  actual:   $actual"
              echo "::error::  url:      $UPSTREAM_URL"
              exit 1
            fi
            echo "Upstream SHA256 verified: $actual"
            rm -f build/work/base.sha256
          else
            echo "::warning::No .sha256 published at $sha_url — upstream integrity not verified at fetch time. Cosign signature on the produced qcow2 remains the downstream integrity guarantee."
          fi

      - name: Decompress base if needed
        shell: bash
        env:
          MODE: ${{ inputs.decompress }}
        run: |
          set -euo pipefail
          case "$MODE" in
            none) mv build/work/base build/work/working.qcow2 ;;
            xz)   xz   -dc build/work/base > build/work/working.qcow2 && rm build/work/base ;;
            gz)   gunzip -c build/work/base > build/work/working.qcow2 && rm build/work/base ;;
            zst)  zstd -dc build/work/base > build/work/working.qcow2 && rm build/work/base ;;
            bz2)  bzcat   build/work/base > build/work/working.qcow2 && rm build/work/base ;;
            *)    echo "::error::unknown decompress mode: $MODE"; exit 1 ;;
          esac
          qemu-img info build/work/working.qcow2

      - name: Run caller customize script
        shell: bash
        env:
          CUSTOMIZE_SCRIPT: ${{ inputs.customize_script }}
        run: |
          set -euo pipefail
          if [[ ! -f "$CUSTOMIZE_SCRIPT" ]]; then
            echo "::error::customize_script not found: $CUSTOMIZE_SCRIPT"
            exit 1
          fi
          chmod +x "$CUSTOMIZE_SCRIPT"
          bash "$CUSTOMIZE_SCRIPT" "$(pwd)/build/work/working.qcow2"

      - name: virt-sysprep
        if: ${{ inputs.run_sysprep }}
        shell: bash
        run: |
          set -euo pipefail
          # `yum-uuid` removed: irrelevant for non-yum guests (Alpine/Alpaquita
          # via apk, Debian/Ubuntu via apt). Harmless on those guests but
          # signals the wrong contract. Add `package-manager-cache` to flush
          # /var/cache/{apk,apt,dnf}/* if the customize hook didn't.
          virt-sysprep -a build/work/working.qcow2 \
            --enable bash-history,logfiles,machine-id,ssh-hostkeys,ssh-userdir,tmp-files,udev-persistent-net,utmp,package-manager-cache

      - name: virt-sparsify
        shell: bash
        env:
          OUTPUT_FILENAME: ${{ steps.vars.outputs.output_filename }}
          DO_COMPRESS: ${{ inputs.sparsify_compress }}
        run: |
          set -euo pipefail
          out="build/output/$OUTPUT_FILENAME"
          flags=()
          if [[ "$DO_COMPRESS" == "true" ]]; then
            flags+=(--compress)
          fi
          virt-sparsify "${flags[@]}" build/work/working.qcow2 "$out"
          rm -f build/work/working.qcow2
          ls -lh "$out"

      - name: Smoke test (boot + cloud-init ConfigDrive)
        # Boots the produced qcow2 in qemu (KVM-accelerated) with a freshly-
        # generated ConfigDrive seed disk, waits for cloud-init to apply the
        # user-data, and SSHs into the guest to verify it actually came up.
        # Fails the build BEFORE checksums/sign/publish so a broken release
        # never ships.
        #
        # ConfigDrive (vs NoCloud) is the openstack-standard seed format and
        # is included in most cloud images' default `datasource_list`
        # (alpaquita's includes it, Proxmox supports it). NoCloud requires
        # consumers to opt in by adding `NoCloud` to their datasource_list,
        # which we want to avoid imposing.
        #
        # ConfigDrive seed layout (vfat label `config-2`):
        #   /openstack/latest/meta_data.json
        #   /openstack/latest/user_data
        #
        # Tools required (all already in the stackopshq builder image):
        #   qemu-kvm                      (qemu-kvm-core)
        #   qemu-img                      (qemu-img)
        #   mkfs.vfat                     (dosfstools)
        #   guestfish                     (libguestfs-tools-c)
        #   ssh, ssh-keygen               (openssh-clients)
        if: ${{ inputs.smoke_test }}
        shell: bash
        env:
          OUTPUT_FILENAME: ${{ steps.vars.outputs.output_filename }}
          TIMEOUT_S: ${{ inputs.smoke_test_timeout_seconds }}
        run: |
          set -euo pipefail
          out="build/output/$OUTPUT_FILENAME"
          work=$(mktemp -d)
          trap 'kill $(cat "$work/qemu.pid" 2>/dev/null) 2>/dev/null || true; rm -rf "$work"' EXIT

          # 1. Ephemeral SSH key for this run.
          ssh-keygen -t ed25519 -f "$work/key" -N '' -q -C smoke-test
          pubkey=$(cat "$work/key.pub")

          # 2. ConfigDrive seed contents.
          mkdir -p "$work/seed/openstack/latest"
          cat > "$work/seed/openstack/latest/meta_data.json" <<EOF
          {
            "uuid": "smoke-${RANDOM}-${RANDOM}",
            "hostname": "smoke-test",
            "name": "smoke-test"
          }
          EOF
          # `lock_passwd: false` is required on Alpine/Alpaquita: with the
          # default `lock_passwd: true`, cloud-init writes `!` in /etc/shadow,
          # and Alpine's PAM stack (UsePAM yes by default in sshd) then
          # rejects the login even with a valid SSH key. The upstream
          # alpaquita cloud.cfg sets the same on its default user for the
          # same reason.
          cat > "$work/seed/openstack/latest/user_data" <<EOF
          #cloud-config
          users:
            - name: smoketest
              groups: [wheel]
              sudo: ["ALL=(ALL) NOPASSWD:ALL"]
              shell: /bin/ash
              lock_passwd: false
              ssh_authorized_keys:
                - $pubkey
          write_files:
            - path: /etc/cloud-init-smoke-ok
              content: "smoke\n"
              permissions: '0644'
          EOF

          # 3. Build the vfat seed image with label CONFIG-2 (uppercase
          # because mkfs.vfat warns on lowercase and ConfigDrive spec
          # accepts both).
          truncate -s 4M "$work/seed.img"
          mkfs.vfat -n CONFIG-2 "$work/seed.img" >/dev/null
          guestfish --rw -a "$work/seed.img" <<EOF
          run
          mount /dev/sda /
          mkdir /openstack
          mkdir /openstack/latest
          copy-in $work/seed/openstack/latest/meta_data.json /openstack/latest
          copy-in $work/seed/openstack/latest/user_data /openstack/latest
          umount /
          EOF

          # 3. Throwaway overlay so the smoke test doesn't mutate the
          # release qcow2 (which has been sparsified/compressed).
          qemu-img create -f qcow2 -F qcow2 -b "$(realpath "$out")" "$work/overlay.qcow2" >/dev/null

          # 4. Boot. user-mode networking with port-forward 2222 → 22.
          # -nographic + serial-to-file so we can dump the boot log on
          # failure.
          #
          # The qemu binary differs by distro: RHEL/Rocky package
          # `qemu-kvm-core` ships `qemu-kvm` (and `/usr/libexec/qemu-kvm`),
          # Debian/Ubuntu's `qemu-system-x86` ships `qemu-system-x86_64`.
          # Both are the same upstream qemu under different names.
          qemu_bin=""
          for cand in qemu-kvm qemu-system-x86_64 /usr/libexec/qemu-kvm; do
            if command -v "$cand" >/dev/null 2>&1 || [[ -x "$cand" ]]; then
              qemu_bin=$(command -v "$cand" 2>/dev/null || echo "$cand")
              break
            fi
          done
          if [[ -z "$qemu_bin" ]]; then
            echo "::error::no qemu binary found (tried qemu-kvm, qemu-system-x86_64, /usr/libexec/qemu-kvm)"
            exit 1
          fi
          echo "Using qemu binary: $qemu_bin"

          # `-machine q35,accel=kvm`: pin to the modern q35 chipset (PCIe,
          # AHCI) instead of the deprecated default `pc-i440fx-<rhel>` machine
          # type, which qemu-kvm warns about on each boot.
          "$qemu_bin" \
            -machine q35,accel=kvm \
            -cpu host \
            -m 1024 -smp 2 \
            -nographic \
            -drive file="$work/overlay.qcow2",format=qcow2,if=virtio \
            -drive file="$work/seed.img",format=raw,if=virtio,readonly=on \
            -netdev user,id=net0,hostfwd=tcp:127.0.0.1:2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -serial file:"$work/serial.log" \
            -monitor none \
            -daemonize -pidfile "$work/qemu.pid"

          # 5. Wait until SSH answers with the marker file.
          # Two-phase loop so failures tell us *where* it broke:
          #   Phase A — wait for the host port-forward to even accept a TCP
          #             handshake (proves qemu is alive and the guest sshd
          #             is listening on :22).
          #   Phase B — wait for the cloud-init marker file via SSH (proves
          #             the user-data was actually applied).
          ssh_opts="-i $work/key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 -o LogLevel=ERROR -p 2222 smoketest@127.0.0.1"
          deadline=$((SECONDS + TIMEOUT_S))
          phase="port"   # one of: port, marker
          tcp_ok=0
          marker_ok=0
          while (( SECONDS < deadline )); do
            if [[ "$phase" == "port" ]]; then
              # bash /dev/tcp probe: opens then closes a TCP connection.
              if (exec 9<>/dev/tcp/127.0.0.1/2222) 2>/dev/null; then
                exec 9<&- 9>&- 2>/dev/null || true
                echo "Smoke phase A: TCP 127.0.0.1:2222 is up at +$((SECONDS))s"
                tcp_ok=1
                phase="marker"
              fi
            else
              if marker=$(ssh $ssh_opts 'cat /etc/cloud-init-smoke-ok' 2>/dev/null) && [[ "$marker" == "smoke" ]]; then
                echo "Smoke phase B: cloud-init marker present at +$((SECONDS))s"
                marker_ok=1
                break
              fi
            fi
            sleep 5
          done
          if [[ "$marker_ok" -ne 1 ]]; then
            if [[ "$tcp_ok" -ne 1 ]]; then
              echo "::error::Smoke timed out after ${TIMEOUT_S}s in phase A — TCP 127.0.0.1:2222 never opened (guest did not boot, or sshd not listening, or networking down)"
            else
              echo "::error::Smoke timed out after ${TIMEOUT_S}s in phase B — TCP up but cloud-init marker /etc/cloud-init-smoke-ok absent (SSH auth failed, or cloud-init did not write the marker)"
              # Last-ditch verbose SSH attempt to surface the auth handshake
              # in CI output (locked account / wrong key / sshd config).
              echo "::group::ssh -vvv (final attempt)"
              ssh -vvv -i "$work/key" \
                  -o StrictHostKeyChecking=no \
                  -o UserKnownHostsFile=/dev/null \
                  -o ConnectTimeout=5 \
                  -o BatchMode=yes \
                  -p 2222 smoketest@127.0.0.1 \
                  'whoami; id; ls -la /etc/cloud-init-smoke-ok 2>&1; cloud-init status --long 2>&1 | head -30' 2>&1 | tail -120 || true
              echo "::endgroup::"
            fi
            echo "::group::serial.log (last 500 lines)"
            tail -n 500 "$work/serial.log" || true
            echo "::endgroup::"
            echo "::group::serial.log (full, ${work}/serial.log)"
            wc -l "$work/serial.log" || true
            cat "$work/serial.log" || true
            echo "::endgroup::"

            # Post-mortem: kill qemu and inspect the overlay disk so we see
            # exactly what cloud-init wrote (authorized_keys, perms, logs).
            # The overlay is a thin copy of the release qcow2 + everything
            # cloud-init has written this boot.
            if [[ -f "$work/qemu.pid" ]]; then
              kill "$(cat "$work/qemu.pid")" 2>/dev/null || true
              sleep 2
              kill -9 "$(cat "$work/qemu.pid")" 2>/dev/null || true
            fi
            echo "::group::guest filesystem post-mortem (guestfish)"
            # NOTE: assembled via printf rather than a heredoc — the YAML
            # `run: |` block strips a fixed indent relative to the first
            # line, so a `<<'EOF'` terminator inside this block can't sit
            # at column 0 without breaking the YAML, and a heredoc's
            # terminator MUST be at column 0 (or use `<<-` with TABs).
            printf '%s\n' \
              'll /home' \
              'll /home/smoketest' \
              'll /home/smoketest/.ssh' \
              'cat /home/smoketest/.ssh/authorized_keys' \
              'cat /etc/passwd' \
              'cat /etc/ssh/sshd_config' \
              'tail-n 100 /var/log/cloud-init.log' \
              'tail-n 100 /var/log/cloud-init-output.log' \
              | guestfish --ro -a "$work/overlay.qcow2" -i 2>&1 || true
            echo "::endgroup::"
            exit 1
          fi
          echo "Smoke test: cloud-init applied user-data and SSH is up"

          # 6. Deeper checks: cloud-init final status + os-release.
          echo "::group::cloud-init status --long"
          ssh $ssh_opts 'cloud-init status --long' || true
          echo "::endgroup::"
          echo "::group::os-release"
          ssh $ssh_opts 'cat /etc/os-release' || true
          echo "::endgroup::"

          # Hard-fail if cloud-init is in 'error' state even though the
          # marker was written (some modules can fail post-write_files).
          status=$(ssh $ssh_opts "cloud-init status 2>/dev/null | awk '{print \$NF}'" || echo unknown)
          if [[ "$status" == "error" ]]; then
            echo "::error::cloud-init final status is 'error'"
            exit 1
          fi

          # 7. Graceful shutdown.
          ssh $ssh_opts 'sudo poweroff' >/dev/null 2>&1 || true
          # Wait briefly for poweroff; if not gone after 15s, EXIT trap kills.
          for _ in $(seq 1 15); do
            kill -0 "$(cat "$work/qemu.pid")" 2>/dev/null || break
            sleep 1
          done

      - name: Generate checksums
        id: checksum
        shell: bash
        env:
          OUTPUT_FILENAME: ${{ steps.vars.outputs.output_filename }}
          VARIANT: ${{ inputs.variant }}
        run: |
          set -euo pipefail
          cd build/output
          sha256sum "$OUTPUT_FILENAME" > "${OUTPUT_FILENAME}.sha256"
          sha1sum   "$OUTPUT_FILENAME" > "${OUTPUT_FILENAME}.sha1"
          md5sum    "$OUTPUT_FILENAME" > "${OUTPUT_FILENAME}.md5"
          # When `variant` is set, suffix the aggregated SHA256SUMS so a
          # caller matrix (glibc/musl, ...) doesn't have its variants
          # overwriting each other at the same bucket path.
          sums_filename="SHA256SUMS"
          if [[ -n "${VARIANT:-}" ]]; then
            sums_filename="SHA256SUMS-${VARIANT}"
          fi
          sha256sum "$OUTPUT_FILENAME" > "$sums_filename"
          sha=$(cut -d' ' -f1 < "${OUTPUT_FILENAME}.sha256")
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "SHA256: $sha"

      - name: Install cosign
        if: ${{ inputs.sign }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2 (cosign 3.x — matches builder)

      - name: Cosign sign-blob (keyless)
        if: ${{ inputs.sign }}
        shell: bash
        env:
          OUTPUT_FILENAME: ${{ steps.vars.outputs.output_filename }}
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          cd build/output
          # Cosign 3.x is bundle-only: --output-signature and
          # --output-certificate are deprecated and silently dropped. The
          # bundle (sigstore protobuf) carries the signature + cert + Rekor
          # proofs in a single file. Consumers verify via:
          #   cosign verify-blob --bundle <file>.bundle \
          #     --certificate-identity-regexp <regex> \
          #     --certificate-oidc-issuer <issuer> \
          #     <file>
          cosign sign-blob "$OUTPUT_FILENAME" \
            --bundle              "${OUTPUT_FILENAME}.bundle" \
            --new-bundle-format=true \
            --yes

      - name: Generate MANIFEST.json
        shell: bash
        env:
          OS_NAME: ${{ inputs.os_name }}
          VERSION: ${{ steps.vars.outputs.version }}
          OUTPUT_FILENAME: ${{ steps.vars.outputs.output_filename }}
          SHA256: ${{ steps.checksum.outputs.sha256 }}
          UPSTREAM_URL: ${{ steps.vars.outputs.upstream_url }}
          SIGNED: ${{ inputs.sign }}
          BUILDER_IMAGE: ${{ inputs.build_container }}
          BUILDER_DIGEST: ${{ needs.verify-builder.outputs.digest }}
          VARIANT: ${{ inputs.variant }}
        run: |
          set -euo pipefail
          cd build/output
          # When `variant` is set, write to MANIFEST-<variant>.json so a
          # multi-variant matrix (e.g. glibc + musl) doesn't have its
          # second job overwriting the first's manifest at the same bucket
          # path. The MANIFEST embeds the variant string for downstream
          # discovery.
          manifest_filename="MANIFEST.json"
          if [[ -n "${VARIANT:-}" ]]; then
            manifest_filename="MANIFEST-${VARIANT}.json"
          fi
          jq -n \
            --arg name             "$OS_NAME" \
            --arg version          "$VERSION" \
            --arg variant          "$VARIANT" \
            --arg filename         "$OUTPUT_FILENAME" \
            --arg sha256           "$SHA256" \
            --arg upstream         "$UPSTREAM_URL" \
            --arg built_at         "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg commit           "${GITHUB_SHA}" \
            --arg run_url          "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg builder_image    "$BUILDER_IMAGE" \
            --arg builder_digest   "$BUILDER_DIGEST" \
            --argjson signed       "${SIGNED}" \
            '{
              name: $name,
              version: $version,
              variant: (if $variant == "" then null else $variant end),
              format: "qcow2",
              filename: $filename,
              sha256: $sha256,
              upstream_url: $upstream,
              built_at: $built_at,
              commit: $commit,
              build_url: $run_url,
              builder: {
                image: $builder_image,
                digest: $builder_digest
              },
              signed: $signed,
              bundle: (if $signed then ($filename + ".bundle") else null end)
            }' > "$manifest_filename"
          echo "Wrote $manifest_filename:"
          cat "$manifest_filename"

      - name: Publish to Garage and R2
        if: ${{ inputs.publish }}
        uses: ./.oic-shared/actions/publish-image
        with:
          os_name: ${{ inputs.os_name }}
          version: ${{ steps.vars.outputs.version }}
          artifacts_dir: build/output
          bucket_name: ${{ inputs.bucket_name }}
          also_latest: ${{ inputs.sync_latest }}
          garage_endpoint: ${{ secrets.S3_GARAGE_ENDPOINT }}
          garage_key_id: ${{ secrets.S3_GARAGE_KEY_ID }}
          garage_secret: ${{ secrets.S3_GARAGE_SECRET }}
          r2_endpoint: ${{ secrets.R2_ENDPOINT }}
          r2_key_id: ${{ secrets.R2_KEY_ID }}
          r2_secret: ${{ secrets.R2_SECRET }}

      - name: Compute Cloudflare purge URL list
        id: purge-paths
        if: ${{ inputs.publish && inputs.sync_latest }}
        shell: bash
        env:
          HOST: ${{ inputs.cf_public_hostname }}
          OS_NAME: ${{ inputs.os_name }}
          OUTPUT_FILENAME: ${{ steps.vars.outputs.output_filename }}
          VARIANT: ${{ inputs.variant }}
        run: |
          set -euo pipefail
          base="https://${HOST}/${OS_NAME}/latest"
          {
            echo "${base}/"
            echo "${base}/index.html"
            echo "${base}/${OUTPUT_FILENAME}"
            echo "${base}/${OUTPUT_FILENAME}.bundle"
            echo "${base}/${OUTPUT_FILENAME}.sha256"
            # MANIFEST + SHA256SUMS: variant-aware. When variant is set, the
            # canonical filenames are MANIFEST-<variant>.json and
            # SHA256SUMS-<variant>. We purge both forms so single-variant
            # callers keep working without change.
            if [[ -n "${VARIANT:-}" ]]; then
              echo "${base}/MANIFEST-${VARIANT}.json"
              echo "${base}/SHA256SUMS-${VARIANT}"
            else
              echo "${base}/MANIFEST.json"
              echo "${base}/SHA256SUMS"
            fi
            echo "https://${HOST}/${OS_NAME}/"
          } > /tmp/purge-paths.txt
          {
            echo 'paths<<PURGE_EOF'
            cat /tmp/purge-paths.txt
            echo 'PURGE_EOF'
          } >> "$GITHUB_OUTPUT"
          cat /tmp/purge-paths.txt

      - name: Purge Cloudflare cache for latest/
        if: ${{ inputs.publish && inputs.sync_latest }}
        uses: ./.oic-shared/actions/cf-purge
        with:
          zone_id: ${{ secrets.CF_ZONE_ID }}
          api_token: ${{ secrets.CF_API_TOKEN }}
          paths: ${{ steps.purge-paths.outputs.paths }}

      - name: Upload artifacts (CI debugging, 7-day retention)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ inputs.os_name }}-${{ steps.vars.outputs.version }}
          path: build/output/
          retention-days: 7
          if-no-files-found: warn
